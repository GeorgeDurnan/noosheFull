openapi: 3.0.0
info:
  title: Nooshe E-Commerce API
  description: Complete API documentation for the Nooshe storefront, products, carts, orders, and authentication.
  version: 1.0.0
servers:
  - url: http://localhost:5000
    description: Local Development Server

tags:
  - name: Auth
  - name: Users
  - name: Addresses
  - name: Products
  - name: Product Categories
  - name: Options
  - name: Option Categories
  - name: Carts
  - name: Orders
  - name: Stripe
  - name: Images
  - name: Contacts
  - name: Business
  - name: Allergens
  - name: Session

# Define Session Cookie Security
security:
  - cookieAuth: []

paths:
  # ==============================
  # Authentication
  # ==============================
  /check:
    post:
      tags: [Auth]
      summary: Verify password without creating a session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Password is correct
        '401':
          description: Incorrect password
  /login:
    post:
      tags: [Auth]
      summary: Login user and start session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Successfully logged in
        '401':
          description: Login failed
  /signup:
    post:
      tags: [Auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        '201':
          description: User registered
  /logout:
    post:
      tags: [Auth]
      summary: Logout current user and destroy session
      responses:
        '200':
          description: Successfully logged out
  /change:
    put:
      tags: [Auth]
      summary: Update password for the currently logged-in user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Password updated and relogged in
        '403':
          description: Cannot update other users passwords
  /me:
    get:
      tags: [Auth]
      summary: Get currently authenticated user data
      responses:
        '200':
          description: Current user info

  # ==============================
  # Users
  # ==============================
  /users:
    get:
      tags: [Users]
      summary: Get all users
      responses:
        '200':
          description: List of users (id and username)
  /users/{id}:
    get:
      tags: [Users]
      summary: Get user by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: User object
    delete:
      tags: [Users]
      summary: Delete a user
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: User deleted

  # ==============================
  # Addresses
  # ==============================
  /basic:
    post:
      tags: [Addresses]
      summary: Create or overwrite a basic address associated with the session ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                address:
                  type: string
      responses:
        '201':
          description: Basic address added
    get:
      tags: [Addresses]
      summary: Get basic address for current session
      responses:
        '200':
          description: Address retrieved
  /address:
    post:
      tags: [Addresses]
      summary: Add full address to DB (requires active cart session)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                line_one:
                  type: string
                line_two:
                  type: string
                city:
                  type: string
                postcode:
                  type: string
      responses:
        '201':
          description: Address added
        '401':
          description: Not authorized (no active cart)
  /address/{id}:
    delete:
      tags: [Addresses]
      summary: Delete a full address
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Address deleted

  # ==============================
  # Products & Categories
  # ==============================
  /products:
    get:
      tags: [Products]
      summary: Get all products
      responses:
        '200':
          description: List of products
    post:
      tags: [Products]
      summary: Create a new product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                price:
                  type: number
                description:
                  type: string
                category_id:
                  type: integer
      responses:
        '201':
          description: Product added
  /products/{id}:
    get:
      tags: [Products]
      summary: Get product by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Product data
    put:
      tags: [Products]
      summary: Update existing product
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                price:
                  type: number
                description:
                  type: string
                category_id:
                  type: integer
      responses:
        '200':
          description: Product modified
    delete:
      tags: [Products]
      summary: Delete a product
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Product deleted
  /cakeCats:
    get:
      tags: [Product Categories]
      summary: Get all product categories
      responses:
        '200':
          description: List of categories
    post:
      tags: [Product Categories]
      summary: Create a product category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  type: string
                rank:
                  type: integer
      responses:
        '201':
          description: Category added
  /cakeCats/{id}:
    put:
      tags: [Product Categories]
      summary: Update a product category
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  type: string
                rank:
                  type: integer
      responses:
        '200':
          description: Category modified
    delete:
      tags: [Product Categories]
      summary: Delete a product category
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Category deleted

  # ==============================
  # Options & Option Categories
  # ==============================
  /options:
    post:
      tags: [Options]
      summary: Add a new option
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                product_id:
                  type: integer
                price:
                  type: number
                description:
                  type: string
                cat_id:
                  type: integer
                rank:
                  type: integer
      responses:
        '201':
          description: Option added
  /options/{id}:
    get:
      tags: [Options]
      summary: Get all options for a specific product
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: List of options
    put:
      tags: [Options]
      summary: Update a specific option
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                price:
                  type: number
                description:
                  type: string
                cat_id:
                  type: integer
      responses:
        '200':
          description: Option modified
    delete:
      tags: [Options]
      summary: Delete an option
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Option deleted
  /categories:
    post:
      tags: [Option Categories]
      summary: Add an option category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                multiple:
                  type: boolean
                description:
                  type: string
                rank:
                  type: integer
                required:
                  type: boolean
                product_id:
                  type: integer
      responses:
        '201':
          description: Category created
  /categories/{id}:
    get:
      tags: [Option Categories]
      summary: Get all option categories for a specific product
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Categories list
    put:
      tags: [Option Categories]
      summary: Update an option category
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                multiple:
                  type: boolean
                description:
                  type: string
      responses:
        '200':
          description: Category modified
    delete:
      tags: [Option Categories]
      summary: Delete an option category
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Category deleted

  # ==============================
  # Carts
  # ==============================
  /carts:
    get:
      tags: [Carts]
      summary: Get all carts (Admin)
      responses:
        '200':
          description: List of carts
    put:
      tags: [Carts]
      summary: Update quantity of an item in the cart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                product_id:
                  type: integer
                quantity:
                  type: integer
                options:
                  type: object
                  description: JSONB object of options
                extra:
                  type: string
                  nullable: true
      responses:
        '200':
          description: Quantity updated
  /carts/{id}:
    delete:
      tags: [Carts]
      summary: Delete a cart
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Cart deleted
  /carts/items:
    get:
      tags: [Carts]
      summary: Get cart items for the current session ID
      responses:
        '200':
          description: Cart items retrieved
    delete:
      tags: [Carts]
      summary: Delete a specific item from the cart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: integer
                  description: Cart item ID
      responses:
        '200':
          description: Item deleted
  /carts/items/{id}:
    get:
      tags: [Carts]
      summary: Get cart by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Cart data
  /carts/addItem:
    post:
      tags: [Carts]
      summary: Add an item to the session cart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                product_id:
                  type: integer
                quantity:
                  type: integer
                options:
                  type: object
                id:
                  type: integer
                  description: Client-side generated ID for UI handling
                extra:
                  type: string
                  nullable: true
      responses:
        '201':
          description: Item added successfully
  /carts/status/{status}:
    get:
      tags: [Carts]
      summary: Get carts by status
      parameters:
        - in: path
          name: status
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Carts matching status

  # ==============================
  # Orders
  # ==============================
  /orders:
    get:
      tags: [Orders]
      summary: Get all orders
      responses:
        '200':
          description: List of orders
  /orders/{id}:
    get:
      tags: [Orders]
      summary: Get specific order
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Order details
    delete:
      tags: [Orders]
      summary: Delete an order
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Order deleted
  /orders/items/{id}:
    get:
      tags: [Orders]
      summary: Get all items for an order and its total
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Items and calculated total price
  /orders/status/{status}:
    get:
      tags: [Orders]
      summary: Get orders by status
      parameters:
        - in: path
          name: status
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of orders

  # ==============================
  # Stripe
  # ==============================
  /create-checkout-session:
    post:
      tags: [Stripe]
      summary: Create a Stripe checkout session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                cart:
                  type: array
                  items:
                    type: object
                address_id:
                  type: integer
      responses:
        '200':
          description: Returns clientSecret
  /verify-pay:
    post:
      tags: [Stripe]
      summary: Verify payment status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sessionId:
                  type: string
      responses:
        '200':
          description: Paid
        '400':
          description: Not paid
  /webhook:
    post:
      tags: [Stripe]
      summary: Stripe webhook receiver
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Received

  # ==============================
  # Images
  # ==============================
  /images:
    post:
      tags: [Images]
      summary: Upload an image to Cloudinary
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                product_id:
                  type: integer
                rank:
                  type: integer
      responses:
        '201':
          description: Image uploaded and saved
    delete:
      tags: [Images]
      summary: Delete an image
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                product_id:
                  type: integer
                rank:
                  type: integer
      responses:
        '200':
          description: Image deleted
  /cakes:
    get:
      tags: [Images]
      summary: Return all images database-wide
      responses:
        '200':
          description: Images array
  /cakes/{id}:
    get:
      tags: [Images]
      summary: Return images for a specific product
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Images array

  # ==============================
  # Contacts & Business
  # ==============================
  /contacts:
    post:
      tags: [Contacts]
      summary: Create inbound lead contact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
      responses:
        '201':
          description: Contact added
  /contacts/{id}:
    delete:
      tags: [Contacts]
      summary: Delete a contact
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Contact deleted
  /wholesale:
    post:
      tags: [Business]
      summary: Create a business contact lead
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                contactPerson:
                  type: string
                email:
                  type: string
                phone:
                  type: string
                address:
                  type: string
                textbox:
                  type: string
      responses:
        '201':
          description: Wholesale contact added
  /wholesale/{id}:
    delete:
      tags: [Business]
      summary: Delete a wholesale contact
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Wholesale contact deleted

  # ==============================
  # Allergens
  # ==============================
  /allergens:
    get:
      tags: [Allergens]
      summary: Get all allergens for all products
      responses:
        '200':
          description: Array of allergens
    post:
      tags: [Allergens]
      summary: Add allergens for a new product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AllergensPayload'
      responses:
        '201':
          description: Allergen added
  /allergens/{id}:
    get:
      tags: [Allergens]
      summary: Get allergens for a specific product ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Allergens retrieved
    put:
      tags: [Allergens]
      summary: Update allergens for an existing product
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AllergensPayload'
      responses:
        '200':
          description: Allergens updated
    delete:
      tags: [Allergens]
      summary: Delete allergens for a product
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Allergens deleted

  # ==============================
  # Sessions
  # ==============================
  /session:
    delete:
      tags: [Session]
      summary: Delete session from database
      responses:
        '200':
          description: Session deleted

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: connect.sid
  schemas:
    AllergensPayload:
      type: object
      properties:
        product_id:
          type: integer
        celery:
          type: boolean
        gluten:
          type: boolean
        crustaceans:
          type: boolean
        eggs:
          type: boolean
        fish:
          type: boolean
        lupin:
          type: boolean
        molluscs:
          type: boolean
        mustard:
          type: boolean
        tree_nuts:
          type: boolean
        peanuts:
          type: boolean
        sesame:
          type: boolean
        soya:
          type: boolean
        sulphides:
          type: boolean
        lactose:
          type: boolean